<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital Management Dashboard</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #e3f2fd, #e0f7fa);
      color: #333;
    }

    header {
      background: linear-gradient(to right, #0077b6, #00b4d8);
      color: #fff;
      height: 60px;
      width: 98%;
      padding: 0 20px;
      font-size: 26px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logout a {
      font-size: 18px;
      color: #ff4d4d;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 8px;
      transition: 0.3s;
      background-color: #fff;
      font-weight: bold;
    }

    .logout a:hover {
      color: white;
      background-color: #ff4d4d;
    }

    nav {
      width: 220px;
      height: 100vh;
      position: fixed;
      top: 60px; /* start after header */
      left: 0;
      background: linear-gradient(to bottom, #001f54, #003580);
      padding-top: 20px;
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.2);
      animation: slideInLeft 0.7s ease-out;
    }

    nav ul {
      list-style-type: none;
      padding: 0;
    }

    nav ul li {
      margin: 20px 0;
    }

    nav ul li a {
      color: #fff;
      text-decoration: none;
      padding: 12px 20px;
      display: block;
      border-radius: 8px;
      transition: background 0.3s;
      font-weight: 500;
    }

    nav ul li a:hover {
      background-color: #00b4d8;
    }

    main {
      margin-left: 240px;
      padding: 90px 30px 60px; /* top padding includes header height */
      min-height: calc(100vh - 60px);
    }

    .dashboard-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 25px;
    }

    .card {
      background: linear-gradient(to top left, #ffffff, #e0f7fa);
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      animation: fadeIn 0.8s ease-out;
      animation-fill-mode: both;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      background: linear-gradient(to top left, #d0f0f7, #b2ebf2);
      animation: pulse 1.5s infinite;
    }

    .card h3 {
      margin-bottom: 10px;
      color: #0077b6;
      font-size: 22px;
    }

    .card p {
      font-size: 22px;
      font-weight: bold;
      color: #004d61;
    }
    
.container{
    margin-left: 233px;
    margin-top: 100px;
    width: 950px;
    height: auto;
}
table {
    width: 99%;
    border-collapse: collapse;
    margin-top:0px;
    margin-left: 10px;
}
table th, table td {
    border: 1px solid #ced4da;
    padding: 10px;
    text-align: center;

}
table th {
    background: #007bff;
    color: white;
}

    footer {
      text-align: center;
      padding: 12px;
      background-color: #004aad;
      color: #fff;
      position: fixed;
      bottom: 0;
      left: 240px;
      width: calc(100% - 240px);
      font-size: 14px;
    }

    /* --- Animations --- */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInLeft {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 180, 216, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(0, 180, 216, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 180, 216, 0); }
    }
  </style>
</head>
<body>

<header>
  Hospital Management System
  <div class="logout">
    <a href="login page.html">Logout</a>
  </div>
</header>

<nav>
  <ul>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="check up patient.html">Check Up Patient</a></li>
    <li><a href="add emergancy case.html">Add Emergency Case</a></li>
    <li><a href="admit patient.html">Patient Admit</a></li>
    <li><a href="appointments.html">Appointments</a></li>
    <li><a href="bill pay.html">Bill Pay</a></li>
    <li><a href="my profile.html">My Profile</a></li>

  </ul>
</nav>

<div class="container" id="patient-details">
    <h3>Recorded Patient Details:</h3>
    <table>
        <thead>
            <tr>
                <th>Patient ID</th>
                <th>Patient Name</th>
                <th>contact number</th>
                <th>Gender</th>
                <th>age</th>
                <Th>ression</Th>
                <th>status</th>
            </tr>
        </thead>
      <tbody id="patient-body"></tbody>  
    </table>
    
</div>
<script>
  window.onload = function () {
    // Display patient data in table
    const patients = JSON.parse(localStorage.getItem("patients")) || [];
    const tableBody = document.getElementById("patient-body");

    patients.forEach(patient => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${patient.id}</td>
        <td>${patient.name}</td>
        <td>${patient.contact}</td>
        <td>${patient.gender}</td>
        <td>${patient.age}</td>
        <td>${patient.ression}</td>
        <td>${patient.status}</td>
      `;
      tableBody.appendChild(row);
    });

    // Auto-generate and set patient ID
    let lastId = localStorage.getItem("lastPatientId");
    let newId = lastId ? parseInt(lastId) + 1 : 1;
    localStorage.setItem("lastPatientId", newId);
    
    const patientIdInput = document.getElementById("patient_id");
    if (patientIdInput) {
      patientIdInput.value = newId;
    }
  };

  // Store patient details
  function storePatientDetails() {
    const id = document.getElementById("patient_id").value;
    const name = document.getElementById("name").value;
    const contact = document.getElementById("contact").value;
    const gender = document.getElementById("gender").value;
    const age = document.getElementById("age").value;
    const status = document.getElementById("status").value;

    const newPatient = {
      id,
      name,
      contact,
      gender,
      age,
      status
    };

    const patients = JSON.parse(localStorage.getItem("patients")) || [];
    patients.push(newPatient);
    localStorage.setItem("patients", JSON.stringify(patients));

    // Also update lastPatientId
    localStorage.setItem("lastPatientId", id);

    alert("Patient details saved!");
  }
</script>


</body>
</html>
