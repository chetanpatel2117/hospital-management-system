<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital Management Dashboard</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #e3f2fd, #e0f7fa);
      color: #333;
    }

    header {
      background: linear-gradient(to right, #0077b6, #00b4d8);
      color: #fff;
      height: 60px;
      width: 98%;
      padding: 0 20px;
      font-size: 26px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logout a {
      font-size: 18px;
      color: #ff4d4d;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 8px;
      transition: 0.3s;
      background-color: #fff;
      font-weight: bold;
    }

    .logout a:hover {
      color: white;
      background-color: #ff4d4d;
    }

    nav {
      width: 220px;
      height: 100vh;
      position: fixed;
      top: 60px; /* start after header */
      left: 0;
      background: linear-gradient(to bottom, #001f54, #003580);
      padding-top: 20px;
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.2);
      animation: slideInLeft 0.7s ease-out;
    }

    nav ul {
      list-style-type: none;
      padding: 0;
    }

    nav ul li {
      margin: 20px 0;
    }

    nav ul li a {
      color: #fff;
      text-decoration: none;
      padding: 12px 20px;
      display: block;
      border-radius: 8px;
      transition: background 0.3s;
      font-weight: 500;
    }

    nav ul li a:hover {
      background-color: #00b4d8;
    }

    main {
      margin-left: 240px;
      padding: 90px 30px 60px; /* top padding includes header height */
      min-height: calc(100vh - 60px);
    }

    .dashboard-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 25px;
    }

    .card {
      background: linear-gradient(to top left, #ffffff, #e0f7fa);
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      animation: fadeIn 0.8s ease-out;
      animation-fill-mode: both;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      background: linear-gradient(to top left, #d0f0f7, #b2ebf2);
      animation: pulse 1.5s infinite;
    }

    .card h3 {
      margin-bottom: 10px;
      color: #0077b6;
      font-size: 22px;
    }

    .card p {
      font-size: 22px;
      font-weight: bold;
      color: #004d61;
    }
    .container {
    max-width: 800px;
    top: 20px;
    margin: 20px auto;
    background: #ffffff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
}
h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #343a40;
}
form label {
    display: block;
    margin: 10px 0 5px;
    font-weight: bold;
}
form input, form select, form textarea, form button {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border: 1px solid #ced4da;
    border-radius: 5px;
}
form button {
    background-color: #007bff;
    color: #fff;
    cursor: pointer;
}
form button:hover {
    background-color: #0056b3;
}


    footer {
      text-align: center;
      padding: 12px;
      background-color: #004aad;
      color: #fff;
      position: fixed;
      bottom: 0;
      left: 240px;
      width: calc(100% - 240px);
      font-size: 14px;
    }

    /* --- Animations --- */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInLeft {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 180, 216, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(0, 180, 216, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 180, 216, 0); }
    }
  </style>
</head>
<body>

<header>
  Hospital Management System
  <div class="logout">
    <a href="login page.html">Logout</a>
  </div>
</header>

<nav>
  <ul>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="check up patient.html">Check Up Patient</a></li>
    <li><a href="add emergancy case.html">Add Emergency Case</a></li>
    <li><a href="admit patient.html">Patient Admit</a></li>
    <li><a href="appointments.html">Appointments</a></li>
    <li><a href="bill pay.html">Bill Pay</a></li>
    <li><a href="my profile.html">My Profile</a></li>
   
  </ul>
</nav>
<div class="container">
    <h2>Admit Patient Details</h2>
    <form id="admitPatientForm">

      <label for="patient-id">Patient ID:</label>
        <input type="text" id="patient-id" placeholder="Enter patient's ID" required>

    
        <label for="patient-name">Patient Name:</label>
        <input type="text" id="patient-name" placeholder="Enter patient's name" required>

        

        <label for="admission-date">Admission Date:</label>
        <input type="date" id="admission-date" required>

        <label for="ward">Ward:</label>
        <select id="ward" required>
            <option value="">Select Ward</option>
            <option value="General">General</option>
            <option value="Private">Private</option>
            <option value="ICU">ICU</option>
            <option value="Pediatrics">Pediatrics</option>
        </select>

        <label for="patient-id">Room No:</label>
        <input type="text" id="Room-No" placeholder="Enter room no" required>


        <label for="reason">Reason for Admission:</label>
        <textarea id="reason" rows="4" placeholder="Enter reason for admission"></textarea>

        <button type="submit">Admit Patient</button>
    </form>
</div>
<script>
  window.addEventListener("load", function () {
    let lastId = localStorage.getItem("lastcaseId");
    let newIdNumber = (!lastId || isNaN(parseInt(lastId))) ? 1 : parseInt(lastId) + 1;
    let newId = "P" + newIdNumber.toString().padStart(3, '0'); // Format: P001

    document.getElementById("patient-id").value = newId;

    document.getElementById("admitPatientForm").addEventListener("submit", function (e) {
      e.preventDefault();

      localStorage.setItem("lastcaseId", newIdNumber);

      const patientId = document.getElementById("patient-id").value.trim();
      const patientName = document.getElementById("patient-name").value.trim();
      const admissionDate = document.getElementById("admission-date").value;
      const ward = document.getElementById("ward").value;
      const roomNo = document.getElementById("Room-No").value.trim();
      const reason = document.getElementById("reason").value.trim();

      if (!patientId || !patientName || !admissionDate || !ward || !roomNo) {
        alert("Please fill out all required fields.");
        return;
      }

      const admitDetails = {
        patientId,
        patientName,
        admissionDate,
        ward,
        roomNo,
        reason,
      };

      let admittedPatients = JSON.parse(localStorage.getItem("admittedPatients")) || [];
      admittedPatients.push(admitDetails);
      localStorage.setItem("admittedPatients", JSON.stringify(admittedPatients));

      // Redirect to details page
      window.location.href = "admit patientdetails.html";
    });
  });
</script>



</body>
</html>
