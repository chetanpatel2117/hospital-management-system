<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital Management Dashboard</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #e3f2fd, #e0f7fa);
      color: #333;
    }

    header {
      background: linear-gradient(to right, #0077b6, #00b4d8);
      color: #fff;
      height: 60px;
      width: 98%;
      padding: 0 20px;
      font-size: 26px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logout a {
      font-size: 18px;
      color: #ff4d4d;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 8px;
      transition: 0.3s;
      background-color: #fff;
      font-weight: bold;
    }

    .logout a:hover {
      color: white;
      background-color: #ff4d4d;
    }

    nav {
      width: 220px;
      height: 100vh;
      position: fixed;
      top: 60px; /* start after header */
      left: 0;
      background: linear-gradient(to bottom, #001f54, #003580);
      padding-top: 20px;
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.2);
      animation: slideInLeft 0.7s ease-out;
    }

    nav ul {
      list-style-type: none;
      padding: 0;
    }

    nav ul li {
      margin: 20px 0;
    }

    nav ul li a {
      color: #fff;
      text-decoration: none;
      padding: 12px 20px;
      display: block;
      border-radius: 8px;
      transition: background 0.3s;
      font-weight: 500;
    }

    nav ul li a:hover {
      background-color: #00b4d8;
    }

    main {
      margin-left: 240px;
      padding: 90px 30px 60px; /* top padding includes header height */
      min-height: calc(100vh - 60px);
    }

    .dashboard-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 25px;
    }

    .card {
      background: linear-gradient(to top left, #ffffff, #e0f7fa);
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      animation: fadeIn 0.8s ease-out;
      animation-fill-mode: both;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      background: linear-gradient(to top left, #d0f0f7, #b2ebf2);
      animation: pulse 1.5s infinite;
    }

    .card h3 {
      margin-bottom: 10px;
      color: #0077b6;
      font-size: 22px;
    }

    .card p {
      font-size: 22px;
      font-weight: bold;
      color: #004d61;
    }
    .container {
    max-width: 600px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #0288d1;
}

form {
    display: flex;
    flex-direction: column;
}

label {
    margin-bottom: 8px;
    font-weight: bold;
}

input, select, textarea {
    padding: 10px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 16px;
}

input[type="submit"] {
    background-color: #0288d1;
    color: white;
    border: none;
    cursor: pointer;
    padding: 12px;
    font-size: 18px;
    border-radius: 5px;
}

input[type="submit"]:hover {
    background-color: #01579b;
}

    footer {
      text-align: center;
      padding: 12px;
      background-color: #004aad;
      color: #fff;
      position: fixed;
      bottom: 0;
      left: 240px;
      width: calc(100% - 240px);
      font-size: 14px;
    }

    /* --- Animations --- */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInLeft {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 180, 216, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(0, 180, 216, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 180, 216, 0); }
    }
  </style>
</head>
<body>

<header>
  Hospital Management System
  <div class="logout">
    <a href="login page.html">Logout</a>
  </div>
</header>

<nav>
  <ul>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="check up patient.html">Check Up Patient</a></li>
    <li><a href="add emergancy case.html">Add Emergency Case</a></li>
    <li><a href="admit patient.html">Patient Admit</a></li>
    <li><a href="appointments.html">Appointments</a></li>
    <li><a href="bill pay.html">Bill Pay</a></li>
    <li><a href="my profile.html">My Profile</a></li>
  
  </ul>
</nav>

<div class="container">
    <h2>emergancy case Form</h2>
    <form id="admitPatientForm" action="#" method="POST">

      <label for="case ID">Case ID</label>
      <input type="text" id="case_id" name="case_id" placeholder="Enter case ID" required>

        <label for="patient-name">patient name:</label>
        <input type="text" id="name" name="name" placeholder="Enter patient name" required>
       
        <label for="contact">Contact Number:</label>
        <input type="tel" id="contact" name="contact" placeholder="Enter your contact number" required>
        
        <label for="emergency-type">emergency type:</label>
        <input type="text" id="emergency" name="emergency" placeholder="Enter emergency type" required>

        <label for="condition">condition:</label>
        <select id="condition" name="condition" required>
            <option value=""disabled selected>Select a condition</option>
            <option value="low"style="color: green;">low</option>
            <option value="Medium" style="color: yellow;">Medium</option>
            <option value="high" style="color: red;">high</option>
        </select>
        <input type="submit" value="submit">
    </form>
</div>
<script>
  window.addEventListener("load", function () {
    let lastId = localStorage.getItem("lastcaseId");
    let newIdNumber = (!lastId || isNaN(parseInt(lastId))) ? 1 : parseInt(lastId) + 1;
    let newId = "C" + newIdNumber.toString().padStart(3, '0'); // Format: C001

    document.getElementById("case_id").value = newId;

    document.getElementById("admitPatientForm").addEventListener("submit", function (e) {
      e.preventDefault();

      localStorage.setItem("lastcaseId", newIdNumber);

      const emergencyCase = {
        id: newId,
        name: document.getElementById("name").value,
        contact: document.getElementById("contact").value,
        emergencyType: document.getElementById("emergency").value,
        condition: document.getElementById("condition").value,
      };

      let emergencyCases = JSON.parse(localStorage.getItem("emergencyCases")) || [];
      emergencyCases.push(emergencyCase);
      localStorage.setItem("emergencyCases", JSON.stringify(emergencyCases));

      // Display a success message
      const successMessage = document.createElement("p");
      successMessage.textContent = "Emergency case successfully added!";
      successMessage.style.color = "green";
      successMessage.style.fontWeight = "bold";
      successMessage.style.textAlign = "center";
      document.querySelector(".container").appendChild(successMessage);

      // Clear the form fields
      document.getElementById("admitPatientForm").reset();

      window.location.href = "emergancy case.html";
    });

  });
</script>

</body>
</html>
