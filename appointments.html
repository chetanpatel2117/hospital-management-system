<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital Management Dashboard</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #e3f2fd, #e0f7fa);
      color: #333;
    }

    header {
      background: linear-gradient(to right, #0077b6, #00b4d8);
      color: #fff;
      height: 60px;
      width: 98%;
      padding: 0 20px;
      font-size: 26px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logout a {
      font-size: 18px;
      color: #ff4d4d;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 8px;
      transition: 0.3s;
      background-color: #fff;
      font-weight: bold;
    }

    .logout a:hover {
      color: white;
      background-color: #ff4d4d;
    }

    nav {
      width: 220px;
      height: 100vh;
      position: fixed;
      top: 60px; /* start after header */
      left: 0;
      background: linear-gradient(to bottom, #001f54, #003580);
      padding-top: 20px;
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.2);
      animation: slideInLeft 0.7s ease-out;
    }

    nav ul {
      list-style-type: none;
      padding: 0;
    }

    nav ul li {
      margin: 20px 0;
    }

    nav ul li a {
      color: #fff;
      text-decoration: none;
      padding: 12px 20px;
      display: block;
      border-radius: 8px;
      transition: background 0.3s;
      font-weight: 500;
    }

    nav ul li a:hover {
      background-color: #00b4d8;
    }

    main {
      margin-left: 240px;
      padding: 90px 30px 60px; /* top padding includes header height */
      min-height: calc(100vh - 60px);
    }

    .dashboard-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 25px;
    }

    .card {
      background: linear-gradient(to top left, #ffffff, #e0f7fa);
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      animation: fadeIn 0.8s ease-out;
      animation-fill-mode: both;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      background: linear-gradient(to top left, #d0f0f7, #b2ebf2);
      animation: pulse 1.5s infinite;
    }

    .card h3 {
      margin-bottom: 10px;
      color: #0077b6;
      font-size: 22px;
    }

    .card p {
      font-size: 22px;
      font-weight: bold;
      color: #004d61;
    }
    .container {
    max-width: 600px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #0288d1;
}

form {
    display: flex;
    flex-direction: column;
}

label {
    margin-bottom: 8px;
    font-weight: bold;
}

input, select, textarea {
    padding: 10px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 16px;
}

input[type="submit"] {
    background-color: #0288d1;
    color: white;
    border: none;
    cursor: pointer;
    padding: 12px;
    font-size: 18px;
    border-radius: 5px;
}

input[type="submit"]:hover {
    background-color: #01579b;
}


    footer {
      text-align: center;
      padding: 12px;
      background-color: #004aad;
      color: #fff;
      position: fixed;
      bottom: 0;
      left: 240px;
      width: calc(100% - 240px);
      font-size: 14px;
    }

    /* --- Animations --- */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInLeft {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 180, 216, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(0, 180, 216, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 180, 216, 0); }
    }
  </style>
</head>
<body>

<header>
  Hospital Management System
  <div class="logout">
    <a href="login page.html">Logout</a>
  </div>
</header>

<nav>
  <ul>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="check up patient.html">Check Up Patient</a></li>
    <li><a href="add emergancy case.html">Add Emergency Case</a></li>
    <li><a href="admit patient.html">Patient Admit</a></li>
    <li><a href="appointments.html">Appointments</a></li>
    <li><a href="bill pay.html">Bill Pay</a></li>
    <li><a href="my profile.html">My Profile</a></li>
  
  </ul>
</nav>
<div class="container">
    <h2>Appointment Booking Form</h2>
    <form id="appointmentForm" action="#" method="POST">
      
      <label for="Patient ID">Patient ID:</label>
      <input type="text" id="patient-id" name="patient_id" placeholder="Auto-generated ID" readonly required>


        <label for="name">Patient Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>

        <label for="age">Age:</label>
        <input type="age" id="age" name="age" required>

        <label for="contact">Contact Number:</label>
        <input type="tel" id="contact" name="contact" placeholder="Enter your contact number" required>

        <label for="doctor">doctor:</label>
        <select id="doctor" name="doctor" required>
            <option value="" disabled selected>Select a doctor</option>
            <option value="general">dr. chetan patel (general)</option>
            <option value="pediatrics">dr. vijay patel(pediatrics)</option>
            <option value="orthopedics">dr. mitul patel(orthopedics)</option>
            <option value="cardiology">dr. shiv patel(cardiology)</option>
            <option value="neurology">dr. heman patel(neurology)</option>
        </select>

        <label for="date">Preferred Appointment Date:</label>
        <input type="date" id="date" name="date" required>

        <label for="time">Preferred Time:</label>
        <select id="time" name="time" required>
            <option value="" disabled selected>Select a time slot</option>
            <option value="9-11am">9:00 AM - 11:00 AM</option>
            <option value="11-1pm">11:00 AM - 1:00 PM</option>
            <option value="2-4pm">2:00 PM - 4:00 PM</option>
            <option value="4-6pm">4:00 PM - 6:00 PM</option>
        </select>

        <input type="submit" value="Book Appointment">
    </form>
</div>
<script>
  window.addEventListener("load", function () {
    let lastId = localStorage.getItem("lastAppointmentId");
    let newIdNumber = (!lastId || isNaN(parseInt(lastId))) ? 1 : parseInt(lastId) + 1;
    let newId = "P" + newIdNumber.toString().padStart(3, '0'); // e.g., P001

    document.getElementById("patient-id").value = newId;

    document.getElementById("appointmentForm").addEventListener("submit", function (e) {
      e.preventDefault(); // prevent real form submit

      // Save the new ID to localStorage for next time
      localStorage.setItem("lastAppointmentId", newIdNumber);

      // Capture data
      const appointment = {
        patientId: document.getElementById("patient-id").value,
        name: document.getElementById("name").value,
        age: document.getElementById("age").value,
        contact: document.getElementById("contact").value,
        doctor: document.getElementById("doctor").value,
        date: document.getElementById("date").value,
        time: document.getElementById("time").value
      };

      // Save to localStorage (optional)
      let appointments = JSON.parse(localStorage.getItem("appointments")) || [];
      appointments.push(appointment);
      localStorage.setItem("appointments", JSON.stringify(appointments));

      // Redirect or alert
      alert("Appointment booked successfully!");
      window.location.href = "appointment details.html"; // or any confirmation page
    });
  });
</script>


</body>
</html>
