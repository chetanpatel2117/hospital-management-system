<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital Management Dashboard</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #e3f2fd, #e0f7fa);
      color: #333;  
    }

    header {
      background: linear-gradient(to right, #0077b6, #00b4d8);
      color: #fff;
      height: 60px;
      width: 98%;
      padding: 0 20px;
      font-size: 26px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logout a {
      font-size: 18px;
      color: #ff4d4d;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 8px;
      transition: 0.3s;
      background-color: #fff;
      font-weight: bold;
    }

    .logout a:hover {
      color: white;
      background-color: #ff4d4d;
    }

    nav {
      width: 220px;
      height: 100vh;
      position: fixed;
      top: 60px; /* start after header */
      left: 0;
      background: linear-gradient(to bottom, #001f54, #003580);
      padding-top: 20px;
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.2);
      animation: slideInLeft 0.7s ease-out;
    }

    nav ul {
      list-style-type: none;
      padding: 0;
    }

    nav ul li {
      margin: 20px 0;
    }

    nav ul li a {
      color: #fff;
      text-decoration: none;
      padding: 12px 20px;
      display: block;
      border-radius: 8px;
      transition: background 0.3s;
      font-weight: 500;
    }

    nav ul li a:hover {
      background-color: #00b4d8;
    }

    main {
      margin-left: 240px;
      padding: 90px 30px 60px; /* top padding includes header height */
      min-height: calc(100vh - 60px);
    }

    .dashboard-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 25px;
    }

    .card {
      background: linear-gradient(to top left, #ffffff, #e0f7fa);
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      animation: fadeIn 0.8s ease-out;
      animation-fill-mode: both;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      background: linear-gradient(to top left, #d0f0f7, #b2ebf2);
      animation: pulse 1.5s infinite;
    }

    .card h3 {
      margin-bottom: 10px;
      color: #0077b6;
      font-size: 22px;
    }

    .card p {
      font-size: 22px;
      font-weight: bold;
      color: #004d61;
    }
    .container {
    max-width: 600px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

form {
    display: flex;
    flex-direction: column;
}

label {
    margin-bottom: 8px;
    font-weight: bold;
}

input, select, textarea {
    padding: 10px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 16px;
}

input[type="submit"] {
    background-color: #004aad;
    color: white;
    border: none;
    cursor: pointer;
    padding: 12px;
    font-size: 18px;
    border-radius: 5px;
}

input[type="submit"]:hover {
    background-color: #003580;
}

    footer {
      text-align: center;
      padding: 12px;
      background-color: #004aad;
      color: #fff;
      position: fixed;
      bottom: 0;
      left: 240px;
      width: calc(100% - 240px);
      font-size: 14px;
    }

    /* --- Animations --- */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInLeft {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 180, 216, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(0, 180, 216, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 180, 216, 0); }
    }
  </style>
</head>
<body>

<header>
  Hospital Management System
  <div class="logout">
    <a href="login page.html">Logout</a>
  </div>
</header>

<nav>
  <ul>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="check up patient.html">Check Up Patient</a></li>
    <li><a href="add emergancy case.html">Add Emergency Case</a></li>
    <li><a href="admit patient.html">Patient Admit</a></li>
    <li><a href="appointments.html">Appointments</a></li>
    <li><a href="bill pay.html">Bill Pay</a></li>
    <li><a href="my profile.html">My Profile</a></li>
 
  </ul>
</nav>
<div class="container">
    <h2>Patient Form</h2>
    <form action="#" method="POST">
        <label for="patient_id">Patient ID:</label>
        <input type="text" id="patient_id" name="patient_id" placeholder="Enter patient ID" required>

        <label for="name"> Patient Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter patient name" required>     
        <label for="contact">Contact Number:</label>
        <input type="tel" id="contact" name="contact" placeholder="Enter your contact number" required>
        
        <label for="gender">Gender:</label>
        <select id="gender" name="gender" required>
            <option value="" disabled selected>Select your gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select>

        <label for="age">age</label>
        <input type="number" id="age" name="age" placeholder="Enter your age" required>

        <label for="symptoms">Symptoms/Reason for Visit:</label>
        <textarea id="symptoms" name="symptoms" rows="4" placeholder="Briefly describe your symptoms" required></textarea>
        
        <input type="submit" value="Register">
    </form>
</div>


<script>
  // Auto-generate Patient ID
  window.onload = function () {
    let lastId = localStorage.getItem("lastPatientId");

    if (!lastId) {
      lastId = 0;
    }

    let newIdNumber = parseInt(lastId) + 1;
    let newId = "P" + newIdNumber.toString().padStart(3, '0'); // Format: P001, P002...

    document.getElementById("patient_id").value = newId;

    // On form submit, store this new ID
    document.querySelector("form").addEventListener("submit", function (e) {
      e.preventDefault(); // prevent default so you can handle it
      localStorage.setItem("lastPatientId", newIdNumber);

      // Get form data
      const patient = {
        id: newId,
        name: document.getElementById("name").value,
        contact: document.getElementById("contact").value,
        gender: document.getElementById("gender").value,
        age: document.getElementById("age").value,
        symptoms: document.getElementById("symptoms").value,
        status: "Waiting"
      };

      // Store in localStorage
      let patients = JSON.parse(localStorage.getItem("patients")) || [];
      patients.push(patient);
      localStorage.setItem("patients", JSON.stringify(patients));

      // Redirect to second page
      window.location.href = "patient details.html"; // change to your actual file name
    });
  };
</script>

</body>
</html>
