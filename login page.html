<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Hospital Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #e0ecff, #f3f7ff);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .login-box {
      width: 400px;
      padding: 40px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.8s ease-in-out;
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #003580;
    }

    label {
      font-weight: 500;
      margin-bottom: 5px;
      display: block;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      transition: 0.3s;
      font-size: 16px;
    }

    input:focus {
      border-color: #004aad;
      outline: none;
      box-shadow: 0 0 6px rgba(0, 74, 173, 0.2);
    }

    input[type="submit"] {
      width: 100%;
      padding: 12px;
      background-color: #004aad;
      color: white;
      border: none;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    input[type="submit"]:hover {
      background-color: #003580;
      transform: scale(1.02);
    }

    .footer-text {
      text-align: center;
      margin-top: 20px;
      color: #777;
      font-size: 14px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Hospital Management System</h2>
    <form id="loginForm" action="dashboard.html" method="get">
      <label for="username">Username:</label>
      <input type="text" id="username" name="username" placeholder="Enter username" required>

      <label for="password">Password:</label>
      <input type="password" id="password" name="password" placeholder="Enter password" required>

      <input type="submit" value="Login">
    </form>
    <div class="footer-text">
    </div>
  </div>
<script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!username || !password) {
            event.preventDefault();
            alert('Please fill in both username and password.');
            return;
        }

        // Placeholder for server-side validation
        // Remove this block and implement server-side authentication
        if (username !== 'chetanpatel2117' || password !== 'Chetan@2117') {
            event.preventDefault();
            alert('Invalid username or password.');
        } else {
            alert('Login successful!');
            window.location.href = "dashoard.html";
        }
    });
</script>
</body>
</html>
