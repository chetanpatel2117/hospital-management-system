<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital Management Dashboard</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #e3f2fd, #e0f7fa);
      color: #333;
    }

    header {
      background: linear-gradient(to right, #0077b6, #00b4d8);
      color: #fff;
      height: 60px;
      width: 98%;
      padding: 0 20px;
      font-size: 26px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logout a {
      font-size: 18px;
      color: #ff4d4d;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 8px;
      transition: 0.3s;
      background-color: #fff;
      font-weight: bold;
    }

    .logout a:hover {
      color: white;
      background-color: #ff4d4d;
    }

    nav {
      width: 220px;
      height: 100vh;
      position: fixed;
      top: 60px; /* start after header */
      left: 0;
      background: linear-gradient(to bottom, #001f54, #003580);
      padding-top: 20px;
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.2);
      animation: slideInLeft 0.7s ease-out;
    }

    nav ul {
      list-style-type: none;
      padding: 0;
    }

    nav ul li {
      margin: 20px 0;
    }

    nav ul li a {
      color: #fff;
      text-decoration: none;
      padding: 12px 20px;
      display: block;
      border-radius: 8px;
      transition: background 0.3s;
      font-weight: 500;
    }

    nav ul li a:hover {
      background-color: #00b4d8;
    }

    main {
      margin-left: 240px;
      padding: 90px 30px 60px; /* top padding includes header height */
      min-height: calc(100vh - 60px);
    }

    .dashboard-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 25px;
    }

    .card {
      background: linear-gradient(to top left, #ffffff, #e0f7fa);
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      animation: fadeIn 0.8s ease-out;
      animation-fill-mode: both;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      background: linear-gradient(to top left, #d0f0f7, #b2ebf2);
      animation: pulse 1.5s infinite;
    }

    .card h3 {
      margin-bottom: 10px;
      color: #0077b6;
      font-size: 22px;
    }

    .card p {
      font-size: 22px;
      font-weight: bold;
      color: #004d61;
    }
    h2 {
      margin-top: 80px; /* Space for header */
      margin-left: 220px;
      font-size: 24px;
      color: #0077b6;
    }
   
table {
    width: 80%;
    border-collapse: collapse;
    margin-top:0px;
    margin-left: 220px;
}
table th, table td {
    border: 1px solid #ced4da;
    padding: 10px;
    text-align: center;

}
table th {
    background: #007bff;
    color: white;
}
    footer {
      text-align: center;
      padding: 12px;
      background-color: #004aad;
      color: #fff;
      position: fixed;
      bottom: 0;
      left: 240px;
      width: calc(100% - 240px);
      font-size: 14px;
    }

    /* --- Animations --- */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInLeft {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 180, 216, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(0, 180, 216, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 180, 216, 0); }
    }
  </style>
</head>
<body>

<header>
  Hospital Management System
  <div class="logout">
    <a href="login page.html">Logout</a>
  </div>
</header>

<nav>

    <li><a href="bill pay.html">Bill Pay</a></li>
    <li><a href="my profile.html">My Profile</a></li>
    
  </ul>
</nav>
 
<h2>Admitted Patients:</h2>
        <table class="admit">
            <thead>
                <tr>
                    <th>Patient ID</th>
                    <th>Patient Name</th>
                    <th>Admission Date</th>
                    <th>Ward</th>
                    <th>Room No</th>
                    <th>Reason</th>
                    
                </tr>
            </thead>
            <tbody>
                <!-- Admitted patient details will appear here -->
            </tbody>
        </table>
    </div>
</head>
<script>
  window.onload = function () {
    // Get admitted patients from localStorage
    let admittedPatients = JSON.parse(localStorage.getItem("admittedPatients")) || [];

    const tableBody = document.querySelector("table.admit tbody");

    // Clear any existing rows
    tableBody.innerHTML = "";

    // Populate table with admitted patient data
    admittedPatients.forEach(admittedPatient => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${admittedPatient.patientId}</td>
        <td>${admittedPatient.patientName}</td>
        <td>${admittedPatient.admissionDate}</td>
        <td>${admittedPatient.ward}</td>
        <td>${admittedPatient.roomNo}</td>
        <td>${admittedPatient.reason}</td>
      `;
      tableBody.appendChild(row);
    });
  };
  // Add event listeners for "Done" and "Delete" buttons
  tableBody.addEventListener("click", function (event) {
        const target = event.target;
        const index = target.getAttribute("data-index");

        if (target.classList.contains("done-btn")) {
          alert(`Appointment for ${appointments[index].name} marked as done.`);
          appointments.splice(index, 1); // Remove the appointment
          localStorage.setItem("appointments", JSON.stringify(appointments));
          location.reload(); // Reload the page to update the table
        }

        if (target.classList.contains("delete-btn")) {
          const confirmDelete = confirm(
            `Are you sure you want to delete the appointment for ${appointments[index].name}?`
          );
          if (confirmDelete) {
            appointments.splice(index, 1); // Remove the appointment
            localStorage.setItem("appointments", JSON.stringify(appointments));
            location.reload(); // Reload the page to update the table
          }
        }
      });

</script>
