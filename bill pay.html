<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital Management Dashboard</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #e3f2fd, #e0f7fa);
      color: #333;
    }

    header {
      background: linear-gradient(to right, #0077b6, #00b4d8);
      color: #fff;
      height: 60px;
      width: 98%;
      padding: 0 20px;
      font-size: 26px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logout a {
      font-size: 18px;
      color: #ff4d4d;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 8px;
      transition: 0.3s;
      background-color: #fff;
      font-weight: bold;
    }

    .logout a:hover {
      color: white;
      background-color: #ff4d4d;
    }

    nav {
      width: 220px;
      height: 100vh;
      position: fixed;
      top: 60px; /* start after header */
      left: 0;
      background: linear-gradient(to bottom, #001f54, #003580);
      padding-top: 20px;
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.2);
      animation: slideInLeft 0.7s ease-out;
    }

    nav ul {
      list-style-type: none;
      padding: 0;
    }

    nav ul li {
      margin: 20px 0;
    }

    nav ul li a {
      color: #fff;
      text-decoration: none;
      padding: 12px 20px;
      display: block;
      border-radius: 8px;
      transition: background 0.3s;
      font-weight: 500;
    }

    nav ul li a:hover {
      background-color: #00b4d8;
    }

    main {
      margin-left: 240px;
      padding: 90px 30px 60px; /* top padding includes header height */
      min-height: calc(100vh - 60px);
    }

    .dashboard-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 25px;
    }

    .card {
      background: linear-gradient(to top left, #ffffff, #e0f7fa);
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      animation: fadeIn 0.8s ease-out;
      animation-fill-mode: both;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      background: linear-gradient(to top left, #d0f0f7, #b2ebf2);
      animation: pulse 1.5s infinite;
    }

    .card h3 {
      margin-bottom: 10px;
      color: #0077b6;
      font-size: 22px;
    }

    .card p {
      font-size: 22px;
      font-weight: bold;
      color: #004d61;
    }
    
.container {
    max-width: 600px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}

h2 {
    text-align: center;
    color: #0288d1;
    margin-bottom: 20px;
}

form {
    display: flex;
    flex-direction: column;
}

label {
    margin-bottom: 8px;
    font-weight: bold;
}

input, select {
    padding: 10px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 16px;
}

input[type="submit"] {
    background-color: #0288d1;
    color: white;
    border: none;
    cursor: pointer;
    padding: 12px;
    font-size: 18px;
    border-radius: 5px;
}

input[type="submit"]:hover {
    background-color: #01579b;
}


    footer {
      text-align: center;
      padding: 12px;
      background-color: #004aad;
      color: #fff;
      position: fixed;
      bottom: 0;
      left: 240px;
      width: calc(100% - 240px);
      font-size: 14px;
    }

    /* --- Animations --- */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInLeft {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 180, 216, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(0, 180, 216, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 180, 216, 0); }
    }
  </style>
</head>
<body>

<header>
  Hospital Management System
  <div class="logout">
    <a href="login page.html">Logout</a>
  </div>
</header>

<nav>
  <ul>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="check up patient.html">Check Up Patient</a></li>
    <li><a href="add emergancy case.html">Add Emergency Case</a></li>
    <li><a href="admit patient.html">Patient Admit</a></li>
    <li><a href="appointments.html">Appointments</a></li>
    <li><a href="bill pay.html">Bill Pay</a></li>
    <li><a href="my profile.html">My Profile</a></li>
  
  </ul>
</nav>
<div class="container">
  <h2>Pay Your Hospital Bill</h2>
  <form id="billPayForm" action="#" method="POST">
    <label for="patient_name">Patient Name:</label>
    <input type="text" id="patient_name" name="patient_name" placeholder="Enter patient's full name" required>

    <label for="contact">Contact Number:</label>
    <input type="tel" id="contact" name="contact" placeholder="Enter your contact number" required>

    <label for="email">Email Address:</label>
    <input type="email" id="email" name="email" placeholder="Enter your email address" required>

    <label for="bill_number">Bill Number:</label>
    <input type="text" id="bill_number" name="bill_number" readonly required>

    <label for="amount">Amount to Pay (₹):</label>
    <input type="number" id="amount" name="amount" placeholder="Enter the amount to pay" required>

    <label for="payment_method">Payment Method:</label>
    <select id="payment_method" name="payment_method" required>
      <option value="" disabled selected>Select a payment method</option>
      <option value="credit_card">Credit Card</option>
      <option value="debit_card">Debit Card</option>
      <option value="net_banking">Net Banking</option>
      <option value="upi">UPI</option>
    </select>

    <input type="submit" value="Pay Now">
  </form>
  <div id="receipt" style="display:none; margin-top:30px; background:#f7f7f7; border-radius:8px; box-shadow:0 2px 8px #0001; padding:24px;">
    <h3>Payment Receipt</h3>
    <table style="width:100%; border-collapse:collapse; font-size:1rem;">
      <tbody id="receiptDetails"></tbody>
    </table>
    <button onclick="window.print()" style="margin-top:18px; padding:10px 24px; background:#0288d1; color:#fff; border:none; border-radius:6px; font-size:1rem; cursor:pointer;">Print Receipt</button>
  </div>
</div>
<script>
  function generateBillNumber() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const random = Math.floor(1000 + Math.random() * 9000);
    return `HOSP-${year}${month}-${random}`;
  }
  document.getElementById('bill_number').value = generateBillNumber();

  document.getElementById('billPayForm').addEventListener('submit', function(e) {
    e.preventDefault();
    // Simulate payment success
    const form = e.target;
    const receipt = document.getElementById('receipt');
    const details = document.getElementById('receiptDetails');
    details.innerHTML = `
      <tr><td style='font-weight:bold;'>Patient Name:</td><td>${form.patient_name.value}</td></tr>
      <tr><td style='font-weight:bold;'>Contact:</td><td>${form.contact.value}</td></tr>
      <tr><td style='font-weight:bold;'>Email:</td><td>${form.email.value}</td></tr>
      <tr><td style='font-weight:bold;'>Bill Number:</td><td>${form.bill_number.value}</td></tr>
      <tr><td style='font-weight:bold;'>Amount Paid:</td><td>₹${form.amount.value}</td></tr>
      <tr><td style='font-weight:bold;'>Payment Method:</td><td>${form.payment_method.options[form.payment_method.selectedIndex].text}</td></tr>
      <tr><td style='font-weight:bold;'>Date:</td><td>${new Date().toLocaleString()}</td></tr>
    `;
    receipt.style.display = 'block';
    form.style.display = 'none';
  });
</script>
